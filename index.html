<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTSA PRO v2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #191917;
  color: #eeeae1;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 10px;
}

.card {
  background: #222220;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  background: #191917;
  color: #fff;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.primary { background: #79a1bc; }
.secondary { background: #333; color: #fff; }

.extra {
  display: grid;
  grid-template-columns: 1fr 80px 60px 40px;
  gap: 5px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<input id="nome" placeholder="Produto">
<input id="custo" placeholder="Custo Produção">
<input id="frete" placeholder="Frete">
<input id="margem" placeholder="Margem (%)">
<input id="quantidade" placeholder="Quantidade Produzida">
</div>

<div class="card">
<h4>Sociedade</h4>
<input id="empresaPct" placeholder="% Empresa (ex: 40)">
<input id="socios" placeholder="Qtd Sócios">
</div>

<div class="card">
<div id="extras"></div>
<button class="secondary" id="addExtra">+ Extra</button>
</div>

<div class="card">
<button class="primary" id="calc">Calcular</button>
</div>

<div class="card" id="resultado"></div>

</div>

<script>
let extrasEl = document.getElementById("extras");

function parse(v){
  if(!v) return 0;
  return parseFloat(v.replace(",", ".")) || 0;
}

document.getElementById("addExtra").onclick = ()=>{
  let div = document.createElement("div");
  div.className = "extra";
  div.innerHTML = `
    <input placeholder="Nome">
    <input placeholder="R$">
    <input placeholder="Qtd">
    <button>X</button>
  `;
  div.querySelector("button").onclick = ()=> div.remove();
  extrasEl.appendChild(div);
};

document.getElementById("calc").onclick = ()=>{
  let custo = parse(custoEl.value);
  let frete = parse(freteEl.value);
  let margem = parse(margemEl.value);
  let qtd = parse(quantidade.value);
  let empresaPct = parse(empresaPctEl.value);
  let socios = parse(sociosEl.value);

  let totalExtras = 0;
  document.querySelectorAll(".extra").forEach(e=>{
    let v = parse(e.children[1].value);
    let q = parse(e.children[2].value);
    totalExtras += v*q;
  });

  let custoUnit = custo + frete + totalExtras;
  let precoUnit = custoUnit / (1 - margem/100);
  let lucroUnit = precoUnit - custoUnit;

  let custoTotal = custoUnit * qtd;
  let receitaTotal = precoUnit * qtd;
  let lucroTotal = lucroUnit * qtd;

  let empresaValor = lucroTotal * (empresaPct/100);
  let restante = lucroTotal - empresaValor;
  let porSocio = socios > 0 ? restante / socios : 0;

  resultado.innerHTML = `
  <b>UNITÁRIO</b><br>
  Custo: R$ ${custoUnit.toFixed(2)}<br>
  Preço: R$ ${precoUnit.toFixed(2)}<br>
  Lucro: R$ ${lucroUnit.toFixed(2)}<br><br>

  <b>TOTAL (${qtd} unidades)</b><br>
  Receita: R$ ${receitaTotal.toFixed(2)}<br>
  Lucro: R$ ${lucroTotal.toFixed(2)}<br><br>

  <b>DIVISÃO</b><br>
  Empresa: R$ ${empresaValor.toFixed(2)}<br>
  Cada Sócio: R$ ${porSocio.toFixed(2)}
  `;
};

const custoEl = document.getElementById("custo");
const freteEl = document.getElementById("frete");
const margemEl = document.getElementById("margem");
const quantidade = document.getElementById("quantidade");
const empresaPctEl = document.getElementById("empresaPct");
const sociosEl = document.getElementById("socios");
const resultado = document.getElementById("resultado");
</script>

</body>
</html>
