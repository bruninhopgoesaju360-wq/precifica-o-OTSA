<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precificação OTSA PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #191917;
  color: #eeeae1;
  display: flex;
  justify-content: center;
  margin: 0;
}

.container { max-width: 500px; padding: 12px; }

.card {
  background: #222220;
  padding: 12px;
  border-radius: 10px;
  margin-top: 12px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 6px;
  background: #191917;
  color: #fff;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.primary { background: #79a1bc; }
.secondary { background: #333; color: #fff; }

.extra {
  display: grid;
  grid-template-columns: 1fr 70px 70px 35px;
  gap: 5px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<input id="nome" placeholder="Produto">
<input id="custo" inputmode="decimal" placeholder="Custo Produção">
<input id="frete" inputmode="decimal" placeholder="Frete">
<input id="margem" inputmode="decimal" placeholder="Margem (%)">
</div>

<div class="card">
<div id="extras"></div>
<button class="secondary" id="addExtra">+ Extra</button>
</div>

<div class="card">
<input type="file" id="img" accept="image/*">
</div>

<div class="card">
<button class="primary" id="calc">Calcular</button>
<button class="secondary" id="pdf">Gerar PDF</button>
</div>

<div class="card" id="resultado"></div>

</div>

<script>
let extrasEl = document.getElementById("extras");
let imagens = [];
let dados = {};

function parse(v){
  if(!v) return 0;
  return parseFloat(v.replace(",", ".")) || 0;
}

document.getElementById("addExtra").onclick = ()=>{
  let div = document.createElement("div");
  div.className = "extra";
  div.innerHTML = `
    <input placeholder="Nome">
    <input inputmode="decimal" placeholder="R$">
    <input inputmode="numeric" placeholder="Qtd">
    <button>X</button>
  `;
  div.querySelector("button").onclick = ()=> div.remove();
  extrasEl.appendChild(div);
};

document.getElementById("img").onchange = (e)=>{
  imagens = [];
  let reader = new FileReader();
  reader.onload = ev => imagens.push(ev.target.result);
  reader.readAsDataURL(e.target.files[0]);
};

document.getElementById("calc").onclick = ()=>{
  let custo = parse(document.getElementById("custo").value);
  let frete = parse(document.getElementById("frete").value);
  let margem = parse(document.getElementById("margem").value);

  let totalExtras = 0;

  document.querySelectorAll(".extra").forEach(e=>{
    let v = parse(e.children[1].value);
    let q = parse(e.children[2].value);
    totalExtras += v*q;
  });

  let custoTotal = custo + frete + totalExtras;
  let preco = custoTotal / (1 - margem/100);
  let lucro = preco - custoTotal;
  let margemFinal = (lucro / preco) * 100;

  dados = {
    nome: document.getElementById("nome").value,
    custo,
    custoTotal,
    totalExtras,
    preco,
    lucro,
    margem: margemFinal
  };

  document.getElementById("resultado").innerHTML = `
    Custo Total: R$ ${custoTotal.toFixed(2)}<br>
    Preço: R$ ${preco.toFixed(2)}<br>
    Lucro: R$ ${lucro.toFixed(2)}<br>
    Margem: ${margemFinal.toFixed(2)}%
  `;
};

document.getElementById("pdf").onclick = ()=>{
  if(!dados.preco){
    alert("Calcule primeiro");
    return;
  }

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let y = 15;

  doc.setFontSize(16);
  doc.text("RELATÓRIO OTSA", 105, y, {align:"center"});
  y += 10;

  doc.setFontSize(11);

  doc.text("PRODUTO", 10, y); y+=6;
  doc.text(`Nome: ${dados.nome}`, 10, y); y+=10;

  doc.text("CUSTOS", 10, y); y+=6;
  doc.text(`Custo base: R$ ${dados.custo.toFixed(2)}`, 10, y); y+=6;

  document.querySelectorAll(".extra").forEach(e=>{
    let nome = e.children[0].value;
    let v = parse(e.children[1].value);
    let q = parse(e.children[2].value);
    doc.text(`${nome}: R$ ${v} x ${q}`, 10, y);
    y+=6;
  });

  doc.text(`Total extras: R$ ${dados.totalExtras.toFixed(2)}`, 10, y); y+=6;
  doc.text(`Custo total: R$ ${dados.custoTotal.toFixed(2)}`, 10, y); y+=10;

  doc.text("PRECIFICAÇÃO", 10, y); y+=6;
  doc.text(`Preço: R$ ${dados.preco.toFixed(2)}`, 10, y); y+=6;
  doc.text(`Lucro: R$ ${dados.lucro.toFixed(2)}`, 10, y); y+=6;
  doc.text(`Margem: ${dados.margem.toFixed(2)}%`, 10, y); y+=10;

  doc.setFontSize(13);
  doc.text("RESUMO FINAL", 105, y, {align:"center"}); y+=8;

  doc.text(`Custo Total: R$ ${dados.custoTotal.toFixed(2)}`, 10, y); y+=6;
  doc.text(`Lucro: R$ ${dados.lucro.toFixed(2)}`, 10, y); y+=6;
  doc.text(`Margem: ${dados.margem.toFixed(2)}%`, 10, y); y+=6;
  doc.text(`Preço de Venda: R$ ${dados.preco.toFixed(2)}`, 10, y); y+=10;

  if(imagens.length > 0){
    doc.addImage(imagens[0], "JPEG", 55, y, 100, 80);
  }

  doc.save("OTSA_PRO.pdf");
};
</script>
</body>
</html>
