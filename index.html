<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Precificação OTSA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#191917;
color:#eeeae1;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:420px;
padding:15px;
}

.card{
background:#222220;
padding:15px;
border-radius:10px;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #333;
background:#191917;
color:#eeeae1;
}

.preview img{
max-width:100%;
margin-top:5px;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.primary{
background:#79a1bc;
color:#191917;
}

.secondary{
background:#333;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<input id="nome" placeholder="Nome do produto">

<input id="custo" type="number" placeholder="Custo">

<input id="margem" placeholder="Margem (%)">

<input id="frete" type="number" placeholder="Frete">

<textarea id="obs" placeholder="Observações"></textarea>

</div>

<div class="card">

<label>Fotos do produto</label>

<input
type="file"
accept="image/*"
multiple
onchange="previewImagem(event)">

<div id="preview"></div>

</div>

<div class="card">

<button class="primary"
onclick="calcular()">
Calcular
</button>

<button class="secondary"
onclick="gerarPDF()">
Gerar PDF Profissional
</button>

</div>

<div class="card" id="resultado"></div>

</div>

<script>

let imagens=[];
let dados={};

function previewImagem(event){

let files=event.target.files;

for(let i=0;i<files.length;i++){

let reader=new FileReader();

reader.onload=function(e){

imagens.push(e.target.result);

let img=document.createElement("img");
img.src=e.target.result;

preview.appendChild(img);

};

reader.readAsDataURL(files[i]);

}

}

function calcular(){

let nome=nomeEl.value;

let custo=parseFloat(custoEl.value)||0;

let frete=parseFloat(freteEl.value)||0;

let margem=parseFloat(margemEl.value)||0;

let total=custo+frete;

let final=total*(1+margem/100);

let lucro=final-total;

dados={nome,total,final,lucro};

resultado.innerHTML=
`
<b>${nome}</b><br>
Preço Final: R$ ${final.toFixed(2)}<br>
Lucro: R$ ${lucro.toFixed(2)}
`;

}

async function gerarPDF(){

const { jsPDF }=window.jspdf;

let doc=new jsPDF();

let y=15;

//// CABEÇALHO

doc.setFillColor(25,25,23);
doc.rect(0,0,210,25,"F");

doc.setTextColor(238,234,225);
doc.setFontSize(16);

doc.text(
"PRECIFICAÇÃO OTSA",
10,
15
);

doc.setTextColor(0,0,0);

y=35;

//// BLOCO PRODUTO

doc.setFontSize(14);

doc.text(
"INFORMAÇÕES DO PRODUTO",
10,
y
);

y+=5;

doc.setDrawColor(150);
doc.rect(10,y,190,30);

y+=8;

doc.setFontSize(11);

doc.text(
"Produto: "+dados.nome,
15,
y
);

y+=7;

doc.text(
"Custo Total: R$ "+
dados.total.toFixed(2),
15,
y
);

y+=7;

doc.text(
"Preço Final: R$ "+
dados.final.toFixed(2),
15,
y
);

y+=7;

doc.text(
"Lucro: R$ "+
dados.lucro.toFixed(2),
15,
y
);

y+=20;

//// OBSERVAÇÕES

doc.setFontSize(14);

doc.text(
"OBSERVAÇÕES",
10,
y
);

y+=5;

doc.rect(10,y,190,30);

y+=8;

let obsTexto=
document.getElementById("obs").value
||"Nenhuma.";

doc.setFontSize(11);

doc.text(
obsTexto,
15,
y,
{maxWidth:180}
);

y+=40;

//// FOTOS

doc.setFontSize(14);

doc.text(
"FOTOS DO PRODUTO",
10,
y
);

y+=5;

let x=10;

for(let i=0;i<imagens.length;i++){

doc.addImage(
imagens[i],
"JPEG",
x,
y,
40,
40
);

x+=45;

if(x>160){

x=10;
y+=45;

}

}

y+=55;

//// ASSINATURAS

doc.setFontSize(14);

doc.text(
"APROVAÇÃO E ASSINATURAS",
10,
y
);

y+=10;

doc.line(10,y,80,y);

doc.text(
"Sócio 1",
10,
y+5
);

doc.line(110,y,180,y);

doc.text(
"Sócio 2",
110,
y+5
);

y+=20;

doc.line(10,y,80,y);

doc.text(
"Sócio 3",
10,
y+5
);

doc.line(110,y,180,y);

doc.text(
"Data",
110,
y+5
);

doc.save(
"precificacao_profissional_otsa.pdf"
);

}

const nomeEl=
document.getElementById("nome");

const custoEl=
document.getElementById("custo");

const margemEl=
document.getElementById("margem");

const freteEl=
document.getElementById("frete");

</script>

</body>
</html>
