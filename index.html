<!<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precificação OTSA PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #191917;
  color: #eeeae1;
  display: flex;
  justify-content: center;
  margin: 0;
}

.container {
  width: 100%;
  max-width: 500px;
  padding: 12px;
}

h2 { color: #79a1bc; text-align: center; }

.card {
  background: #222220;
  padding: 12px;
  border-radius: 10px;
  margin-top: 12px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #191917;
  color: #eeeae1;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  border-radius: 6px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary { background: #79a1bc; color: #191917; }
.secondary { background: #333; color: white; }

.extra {
  display: grid;
  grid-template-columns: 1fr 70px 70px 35px;
  gap: 5px;
  margin-top: 6px;
}

.preview {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.preview img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 90px;
  gap: 5px;
}

.resultado-item {
  margin-bottom: 6px;
}
</style>
</head>

<body>
<div class="container">

<h2>Precificação OTSA PRO</h2>

<div class="card">
<input id="nome" placeholder="Produto">
<input id="custoProducao" placeholder="Custo Produção (R$)">
<input id="frete" placeholder="Frete (R$)">
<input id="margem" placeholder="Margem (%)">

<div class="row">
<input id="desconto" placeholder="Desconto">
<select id="tipoDesconto">
<option value="porcentagem">%</option>
<option value="valor">R$</option>
</select>
</div>
</div>

<div class="card">
<div id="extras"></div>
<button class="secondary" id="btnExtra">+ Extra</button>
</div>

<div class="card">
<input type="file" accept="image/*" multiple id="inputImg">
<div class="preview" id="preview"></div>
</div>

<div class="card">
<textarea id="obs" placeholder="Observações"></textarea>
</div>

<div class="card">
<button class="primary" id="btnCalc">Calcular</button>
<button class="secondary" id="btnPdf">Gerar PDF</button>
</div>

<div class="card" id="resultado"></div>

</div>

<script>
const nomeEl = document.getElementById("nome");
const custoProdEl = document.getElementById("custoProducao");
const freteEl = document.getElementById("frete");
const margemEl = document.getElementById("margem");
const descontoEl = document.getElementById("desconto");
const tipoDescEl = document.getElementById("tipoDesconto");
const extrasEl = document.getElementById("extras");
const previewEl = document.getElementById("preview");
const inputImg = document.getElementById("inputImg");
const resultadoEl = document.getElementById("resultado");
const btnCalc = document.getElementById("btnCalc");
const btnPdf = document.getElementById("btnPdf");
const btnExtra = document.getElementById("btnExtra");

let imagens = [];
let dados = {};

function parseValor(v){
  if(!v) return 0;
  v = v.replace(/\./g,"").replace(",",".");
  return parseFloat(v) || 0;
}

btnExtra.onclick = () => {
  let div = document.createElement("div");
  div.className="extra";
  div.innerHTML=`
  <input placeholder="Nome">
  <input placeholder="R$">
  <input placeholder="Qtd">
  <button>X</button>`;
  div.querySelector("button").onclick = () => div.remove();
  extrasEl.appendChild(div);
};

inputImg.onchange = (e)=>{
  imagens = [];
  previewEl.innerHTML = "";

  for(let file of e.target.files){
    let r = new FileReader();
    r.onload = ev=>{
      imagens.push(ev.target.result);
      let img=document.createElement("img");
      img.src=ev.target.result;
      previewEl.appendChild(img);
    };
    r.readAsDataURL(file);
  }
};

btnCalc.onclick = ()=>{
  let custoProd = parseValor(custoProdEl.value);
  let frete = parseValor(freteEl.value);
  let margem = parseValor(margemEl.value);
  let desconto = parseValor(descontoEl.value);

  let totalExtras=0;
  document.querySelectorAll(".extra").forEach(e=>{
    let v=parseValor(e.children[1].value);
    let q=parseValor(e.children[2].value);
    totalExtras += v*q;
  });

  let custoTotal = custoProd + frete + totalExtras;

  // 🔥 Margem REAL
  let precoBruto = custoTotal / (1 - margem/100);

  // 🔻 Desconto correto
  let valorDesconto = 0;
  if(tipoDescEl.value === "porcentagem"){
    valorDesconto = precoBruto * (desconto/100);
  } else {
    valorDesconto = desconto;
  }

  let precoFinal = precoBruto - valorDesconto;
  let lucro = precoFinal - custoTotal;
  let margemFinal = (lucro / precoFinal) * 100;

  if(precoFinal <= custoTotal){
    alert("⚠️ Atenção: venda sem lucro ou prejuízo!");
  }

  dados = { nome: nomeEl.value, custoTotal, precoFinal, lucro, margem: margemFinal };

  resultadoEl.innerHTML = `
    <div class="resultado-item">Custo Total: R$ ${custoTotal.toFixed(2)}</div>
    <div class="resultado-item">Preço Final: R$ ${precoFinal.toFixed(2)}</div>
    <div class="resultado-item">Lucro: R$ ${lucro.toFixed(2)}</div>
    <div class="resultado-item">Margem: ${margemFinal.toFixed(2)}%</div>
  `;
};

btnPdf.onclick = ()=>{
  if(!dados.precoFinal){
    alert("Calcule primeiro!");
    return;
  }

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let y=20;
  const dataAtual = new Date().toLocaleString('pt-BR');

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.text("RELATÓRIO OTSA",105,y,{align:"center"});
  y+=10;

  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text(`Emitido em: ${dataAtual}`,10,y);
  y+=8;

  doc.setFont("helvetica","bold");
  doc.text("PRODUTO",10,y);
  y+=6;

  doc.setFont("helvetica","normal");
  doc.text(`Nome: ${dados.nome}`,10,y);
  y+=8;

  doc.setFont("helvetica","bold");
  doc.text("RESULTADO",10,y);
  y+=6;

  doc.setFont("helvetica","normal");
  doc.text(`Custo Total: R$ ${dados.custoTotal.toFixed(2)}`,10,y); y+=6;
  doc.text(`Preço Final: R$ ${dados.precoFinal.toFixed(2)}`,10,y); y+=6;
  doc.text(`Lucro: R$ ${dados.lucro.toFixed(2)}`,10,y); y+=6;
  doc.text(`Margem: ${dados.margem.toFixed(2)}%`,10,y);

  doc.save("OTSA_PRO.pdf");
};
</script>
</body>
</html>
