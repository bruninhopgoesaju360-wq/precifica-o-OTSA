<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Precificação OTSA PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
font-family: Arial;
background: #191917;
color: #eeeae1;
display: flex;
justify-content: center;
margin: 0;
}

.container {
width: 100%;
max-width: 500px;
padding: 12px;
}

h2 { color: #79a1bc; text-align: center; }

.card {
background: #222220;
padding: 12px;
border-radius: 10px;
margin-top: 12px;
}

input, select, textarea {
width: 100%;
padding: 12px;
margin-top: 6px;
border-radius: 6px;
border: 1px solid #333;
background: #191917;
color: #eeeae1;
font-size: 16px;
}

button {
width: 100%;
padding: 14px;
margin-top: 6px;
border-radius: 6px;
border: none;
font-weight: bold;
cursor: pointer;
}

.primary { background: #79a1bc; color: #191917; }
.secondary { background: #333; color: white; }

.extra {
display: grid;
grid-template-columns: 1fr 70px 70px 35px;
gap: 5px;
margin-top: 6px;
}

.preview img {
width: 100%;
margin-top: 6px;
border-radius: 8px;
}

.row {
display: grid;
grid-template-columns: 1fr 90px;
gap: 5px;
}
</style>

</head>

<body>

<div class="container">

<h2>Precificação OTSA PRO</h2>

<div class="card">
<input id="nome" placeholder="Produto">

<input id="custoProducao" inputmode="decimal" type="number" placeholder="Custo Produção (R$)">
<input id="custo" inputmode="decimal" type="number" placeholder="Outros Custos (R$)">
<input id="frete" inputmode="decimal" type="number" placeholder="Frete (R$)">
<input id="margem" inputmode="decimal" type="number" placeholder="Margem (%)">

<div class="row">
<input id="desconto" inputmode="decimal" type="number" placeholder="Desconto">
<select id="tipoDesconto">
<option value="porcentagem">%</option>
<option value="valor">R$</option>
</select>
</div>
</div>

<div class="card">
<div id="extras"></div>
<button class="secondary" onclick="addExtra()">+ Extra</button>
</div>

<div class="card">
<input type="file" accept="image/*" multiple onchange="previewImagem(event)">
<div id="preview"></div>
</div>

<div class="card">
<textarea id="obs" placeholder="Observações"></textarea>
</div>

<div class="card">
<button class="primary" onclick="calcular()">Calcular</button>
<button class="secondary" onclick="gerarPDF()">Gerar PDF</button>
</div>

<div class="card" id="resultado"></div>

</div>

<script>

let imagens=[];
let dados={};

function parseValor(v){ return parseFloat(v)||0; }

function addExtra(){
let div=document.createElement("div");
div.className="extra";
div.innerHTML=`
<input placeholder="Nome">
<input type="number" inputmode="decimal" placeholder="R$">
<input type="number" inputmode="numeric" placeholder="Qtd">
<button onclick="this.parentElement.remove()">X</button>
`;
extras.appendChild(div);
}

function previewImagem(e){
for(let file of e.target.files){
let r=new FileReader();
r.onload=ev=>{
imagens.push(ev.target.result);
let img=document.createElement("img");
img.src=ev.target.result;
preview.appendChild(img);
};
r.readAsDataURL(file);
}
}

function calcular(){

let custoProd=parseValor(custoProducao.value);
let custo=parseValor(custo.value);
let frete=parseValor(frete.value);
let margem=parseValor(margem.value);

let extrasLista=[];
let totalExtras=0;

document.querySelectorAll(".extra").forEach(e=>{
let nome=e.children[0].value||"Extra";
let v=parseValor(e.children[1].value);
let q=parseValor(e.children[2].value);
let sub=v*q;

if(sub>0){
extrasLista.push({nome,v,q,sub});
totalExtras+=sub;
}
});

let total=custoProd+custo+frete+totalExtras;
let precoBruto=total*(1+margem/100);

dados={nome:nome.value,total,precoBruto,margem,extrasLista};

resultado.innerHTML=`Preço: R$ ${precoBruto.toFixed(2)}`;
}

async function gerarPDF(){

const { jsPDF }=window.jspdf;
let doc=new jsPDF();

let y=15;

// HEADER
doc.setFontSize(18);
doc.text("RELATÓRIO OTSA",10,y);
y+=10;

// SEÇÃO CUSTOS
doc.setFontSize(14);
doc.text("CUSTOS",10,y);
y+=6;

doc.setFontSize(11);
doc.text(`Total: R$ ${dados.total.toFixed(2)}`,10,y);
y+=8;

// SEÇÃO GRÁFICO (simulação)
doc.setFontSize(14);
doc.text("SIMULAÇÃO DE MARGEM",10,y);
y+=8;

let base=dados.total;

for(let i=10;i<=dados.margem;i+=10){
let preco=base*(1+i/100);
doc.rect(10,y,preco/10,4); // gráfico simples
doc.text(`${i}%`,10,y+6);
y+=8;
}

// IMAGENS GRANDES
y+=5;
doc.setFontSize(14);
doc.text("IMAGENS",10,y);
y+=8;

let x=10;

imagens.forEach(img=>{
doc.addImage(img,"JPEG",x,y,80,80);
x+=90;
if(x>150){ x=10; y+=85; }
});

doc.save("OTSA_PRO.pdf");
}

</script>

</body>
</html>
