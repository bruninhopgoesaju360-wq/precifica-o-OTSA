<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTSA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e15;
            color: #e5e7eb;
            min-height: 100vh;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            background: #111827;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #1f2937;
            overflow: hidden;
        }

        .header {
            background: #1e40af;
            padding: 28px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.025em;
        }

        .content {
            padding: 28px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #f9fafb;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.15s ease;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #1e293b;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input::placeholder {
            color: #6b7280;
        }

        .extras-section {
            background: #1f2937;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .extras-header {
            background: #1e40af;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
        }

        .extras-list {
            max-height: 220px;
            overflow-y: auto;
        }

        .extra-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 32px;
            gap: 12px;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #374151;
            transition: background-color 0.15s ease;
        }

        .extra-item:hover {
            background: #2d3748;
        }

        .extra-item:last-child {
            border-bottom: none;
        }

        .extra-item input {
            height: 42px;
            padding: 10px 12px;
            font-size: 0.9rem;
        }

        .extra-remove {
            background: #ef4444;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .extra-remove:hover {
            background: #dc2626;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 13px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.15s ease;
            width: 100%;
        }

        .btn:hover {
            background: #2563eb;
        }

        .btn-success {
            background: #059669;
        }

        .btn-success:hover {
            background: #047857;
        }

        .btn-add-extra {
            background: transparent;
            border: 1px solid #60a5fa;
            color: #93c5fd;
            padding: 12px 16px;
            font-size: 0.85rem;
            width: auto;
            justify-content: center;
        }

        .btn-add-extra:hover {
            background: #1e40af;
            border-color: #3b82f6;
            color: white;
        }

        .results {
            background: #1e40af;
            padding: 28px;
            border-radius: 8px;
            margin-top: 24px;
            display: none;
        }

        .result-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .result-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #d1d5db;
        }

        .result-value {
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff;
        }

        .division-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
        }

        .division-item {
            background: rgba(255,255,255,0.08);
            padding: 16px 12px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .division-role {
            font-size: 0.8rem;
            color: #d1d5db;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .image-preview {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            margin-top: 8px;
            display: none;
            border: 1px solid #374151;
        }

        @media (max-width: 640px) {
            body { padding: 16px; }
            .form-row { grid-template-columns: 1fr; }
            .extra-item { 
                grid-template-columns: 2fr 1fr 1fr 40px; 
                gap: 10px;
                padding: 14px 16px;
            }
            .container { margin: 0; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OTSA</h1>
            <div style="font-size: 0.85rem; color: #93c5fd; font-weight: 400;">Calculadora de Custos</div>
        </div>
        
        <div class="content">
            <div class="form-row">
                <div class="form-group">
                    <label>Produto</label>
                    <input type="text" id="productName" placeholder="Nome do produto">
                </div>
                <div class="form-group">
                    <label>Custo Produção</label>
                    <input type="number" id="productionCost" step="0.01" min="0" placeholder="0,00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Margem Lucro</label>
                    <input type="number" id="margin" step="0.1" min="0" max="100" value="30">
                </div>
                <div class="form-group">
                    <label>Imagem</label>
                    <input type="file" id="productImage" accept="image/*">
                    <img id="imagePreview" class="image-preview">
                </div>
            </div>

            <div class="extras-section">
                <div class="extras-header">
                    EXTRAS
                    <button type="button" class="btn-add-extra" onclick="addExtra()">+ Adicionar</button>
                </div>
                <div class="extras-list" id="extrasContainer"></div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn" onclick="calculate()">Calcular</button>
                <button type="button" class="btn btn-success" onclick="exportPDF()">Exportar PDF</button>
            </div>

            <div id="results" class="results"></div>
        </div>
    </div>

    <script>
        let extraId = 0;

        function addExtra() {
            extraId++;
            const container = document.getElementById('extrasContainer');
            const extraDiv = document.createElement('div');
            extraDiv.className = 'extra-item';
            extraDiv.id = `extra-${extraId}`;
            extraDiv.innerHTML = `
                <input type="text" class="extra-name" placeholder="Descrição">
                <input type="number" class="extra-qty" step="0.01" min="0" placeholder="Qtd">
                <input type="number" class="extra-price" step="0.01" min="0" placeholder="R$/un">
                <button type="button" class="extra-remove" onclick="removeExtra('extra-${extraId}')">×</button>
            `;
            container.appendChild(extraDiv);
        }

        function removeExtra(id) {
            document.getElementById(id)?.remove();
        }

        addExtra();

        document.getElementById('productImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', { 
                style: 'currency', 
                currency: 'BRL',
                minimumFractionDigits: 2
            }).format(value || 0);
        }

        function calculate() {
            const productName = document.getElementById('productName').value || 'Produto';
            const productionCost = parseFloat(document.getElementById('productionCost').value) || 0;
            const margin = parseFloat(document.getElementById('margin').value) || 0;

            let extrasTotal = 0;
            document.querySelectorAll('.extra-item').forEach(row => {
                const qty = parseFloat(row.querySelector('.extra-qty').value) || 0;
                const price = parseFloat(row.querySelector('.extra-price').value) || 0;
                extrasTotal += qty * price;
            });

            const totalCost = productionCost + extrasTotal;
            const markupValue = totalCost * (margin / 100);
            const salePrice = totalCost + markupValue;
            const totalProfit = markupValue;

            const companyProfit = totalProfit * 0.4;
            const partnerProfit = totalProfit * 0.2;

            window.currentData = {
                productName, productionCost, extrasTotal, totalCost, markupValue,
                salePrice, totalProfit, margin, companyProfit, partnerProfit
            };

            const results = document.getElementById('results');
            results.innerHTML = `
                <div class="result-grid">
                    <div class="result-item">
                        <span class="result-label">Custo de Produção</span>
                        <span class="result-value">${formatCurrency(productionCost)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Custo dos Extras</span>
                        <span class="result-value">${formatCurrency(extrasTotal)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Custo Total</span>
                        <span class="result-value">${formatCurrency(totalCost)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Margem ${margin}%</span>
                        <span class="result-value">${formatCurrency(markupValue)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Valor a Cobrar</span>
                        <span class="result-value">${formatCurrency(salePrice)}</span>
                    </div>
                </div>
                <div style="background: rgba(255,255,255,0.08); padding: 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; text-align: center;">
                    <div style="font-weight: 600; font-size: 1.1rem;">Lucro Total: ${formatCurrency(totalProfit)}</div>
                </div>
                <div class="division-grid">
                    <div class="division-item">
                        <div class="division-role">Empresa (40%)</div>
                        <div class="result-value">${formatCurrency(companyProfit)}</div>
                    </div>
                    <div class="division-item">
                        <div class="division-role">Sócio 1 (20%)</div>
                        <div class="result-value">${formatCurrency(partnerProfit)}</div>
                    </div>
                    <div class="division-item">
                        <div class="division-role">Sócio 2 (20%)</div>
                        <div class="result-value">${formatCurrency(partnerProfit)}</div>
                    </div>
                    <div class="division-item">
                        <div class="division-role">Sócio 3 (20%)</div>
                        <div class="result-value">${formatCurrency(partnerProfit)}</div>
                    </div>
                </div>
            `;
            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });
        }

        async function exportPDF() {
            if (!window.currentData) return alert('Calcule primeiro');

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            let y = 22;

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(18);
            doc.setTextColor(30, 58, 138);
            doc.text('OTSA', 105, y, { align: 'center' });
            
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(14);
            doc.setTextColor(55, 65, 81);
            doc.text(window.currentData.productName.toUpperCase(), 105, y + 8, { align: 'center' });
            y += 30;

            const img = document.getElementById('imagePreview');
            if (img.style.display !== 'none') {
                try {
                    const canvas = await html2canvas(img, { 
                        scale: 2,
                        backgroundColor: null,
                        useCORS: true
                    });
                    const imgData = canvas.toDataURL('image/png');
                    doc.addImage(imgData, 'PNG', 20, y, 45, 32);
                    doc.addImage(imgData, 'PNG', 135, y, 45, 32);
                    y += 38;
                } catch(e) {
                    console.log('Imagem não disponível para PDF');
                }
            }

            // Tabela 1
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(14);
            doc.setTextColor(30, 58, 138);
            doc.text('CUSTOS DE PRODUÇÃO', 20, y);
            y += 10;

            doc.autoTable({
                startY: y,
                head: [['Descrição', 'Valor']],
                body: [
                    ['Custo de Produção', formatCurrency(window.currentData.productionCost)],
                    ['Custo dos Extras', formatCurrency(window.currentData.extrasTotal)],
                    ['TOTAL DOS CUSTOS', formatCurrency(window.currentData.totalCost)]
                ],
                theme: 'grid',
                styles: { fontSize: 10, cellPadding: 6, font: 'helvetica' },
                headStyles: { 
                    fillColor: [30, 58, 138], 
                    textColor: [255, 255, 255], 
                    fontStyle: 'bold',
                    fontSize: 10
                },
                columnStyles: { 
                    0: { halign: 'left' }, 
                    1: { halign: 'right', fontStyle: 'bold' } 
                },
                rowStyles: { 2: { fillColor: [99, 102, 241], textColor: 255 } }
            });
            y = doc.lastAutoTable.finalY + 15;

            // Tabela 2
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(14);
            doc.text('VALOR A COBRAR', 20, y);
            y += 10;

            doc.autoTable({
                startY: y,
                head: [['Cálculo', 'Valor']],
                body: [
                    [`Margem de Lucro ${window.currentData.margin}%`, formatCurrency(window.currentData.markupValue)],
                    ['PREÇO FINAL', formatCurrency(window.currentData.salePrice)],
                    ['LUCRO TOTAL', formatCurrency(window.currentData.totalProfit)]
                ],
                theme: 'grid',
                styles: { fontSize: 10, cellPadding: 6, font: 'helvetica' },
                headStyles: { 
                    fillColor: [5, 150, 105], 
                    textColor: [255, 255, 255], 
                    fontStyle: 'bold',
                    fontSize: 10
                },
                columnStyles: { 
                    0: { halign: 'left' }, 
                    1: { halign: 'right', fontStyle: 'bold' } 
                },
                rowStyles: { 
                    1: { fillColor: [5, 150, 105], textColor: 255 },
                    2: { fillColor: [34, 197, 94], textColor: 255 }
                }
            });
            y = doc.lastAutoTable.finalY + 15;

            // Tabela 3
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(14);
            doc.text('DIVISÃO DE LUCROS', 20, y);
            y += 10;

            doc.autoTable({
                startY: y,
                head: [['Participante', 'Valor']],
                body: [
                    ['Empresa (40%)', formatCurrency(window.currentData.companyProfit)],
                    ['Sócio 1 (20%)', formatCurrency(window.currentData.partnerProfit)],
                    ['Sócio 2 (20%)', formatCurrency(window.currentData.partnerProfit)],
                    ['Sócio 3 (20%)', formatCurrency(window.currentData.partnerProfit)]
                ],
                theme: 'grid',
                styles: { fontSize: 10, cellPadding: 6, font: 'helvetica' },
                headStyles: { 
                    fillColor: [30, 58, 138], 
                    textColor: [255, 255, 255], 
                    fontStyle: 'bold',
                    fontSize: 10
                },
                columnStyles: { 
                    0: { halign: 'left' }, 
                    1: { halign: 'right', fontStyle: 'bold' } 
                }
            });

            doc.setFontSize(8);
            doc.setTextColor(107, 114, 128);
            doc.text(`Gerado em ${new Date().toLocaleString('pt-BR')}`, 105, 285, { align: 'center' });

            const cleanName = window.currentData.productName.replace(/[^a-z0-9]/gi, '_').substring(0, 20);
            doc.save(`OTSA_${cleanName}_${Date.now().toString().slice(-6)}.pdf`);
        }
    </script>
</body>
</html>
