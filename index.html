<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTSA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1419;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1a1f2b;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .content {
            padding: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #3a4a5a;
        }

        input::placeholder {
            color: #94a3b8;
        }

        .extras-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .extras-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .extras-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .extra-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 24px;
            gap: 12px;
            align-items: end;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 8px;
        }

        .extra-row:last-child {
            margin-bottom: 0;
        }

        .extra-row input {
            height: 40px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.8rem;
            height: 40px;
        }

        .btn-secondary {
            background: #64748b;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-success {
            background: #10b981;
        }

        .btn-success:hover {
            background: #059669;
        }

        .results {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            padding: 24px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        .result-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .result-label {
            font-weight: 500;
        }

        .result-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .division-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .division-item {
            background: rgba(255,255,255,0.1);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .division-role {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .extra-row {
                grid-template-columns: 2fr 1fr 1fr 40px;
                gap: 8px;
            }
        }

        .image-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 8px;
            display: none;
            border: 1px solid #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏭 OTSA</h1>
        </div>
        
        <div class="content">
            <div class="form-row">
                <div class="form-group">
                    <label>Produto</label>
                    <input type="text" id="productName" placeholder="Nome do produto" required>
                </div>
                <div class="form-group">
                    <label>Custo Produção (R$)</label>
                    <input type="number" id="productionCost" step="0.01" min="0" placeholder="0,00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Margem (%)</label>
                    <input type="number" id="margin" step="0.1" min="0" max="100" value="30" placeholder="30">
                </div>
                <div class="form-group">
                    <label>Imagem</label>
                    <input type="file" id="productImage" accept="image/*">
                    <img id="imagePreview" class="image-preview">
                </div>
            </div>

            <div class="extras-section">
                <div class="extras-header">
                    <div class="extras-title">Extras</div>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="addExtra()">+ Novo</button>
                </div>
                <div id="extrasContainer"></div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn" onclick="calculate()">Calcular</button>
                <button type="button" class="btn btn-success" onclick="exportPDF()">PDF</button>
            </div>

            <div id="results" class="results"></div>
        </div>
    </div>

    <script>
        let extraId = 0;

        function addExtra() {
            extraId++;
            const container = document.getElementById('extrasContainer');
            const extraDiv = document.createElement('div');
            extraDiv.className = 'extra-row';
            extraDiv.id = `extra-${extraId}`;
            extraDiv.innerHTML = `
                <input type="text" class="extra-name" placeholder="Nome">
                <input type="number" class="extra-qty" step="0.01" min="0" placeholder="Qtd">
                <input type="number" class="extra-price" step="0.01" min="0" placeholder="R$/un">
                <button type="button" class="btn btn-sm" onclick="removeExtra('extra-${extraId}')">×</button>
            `;
            container.appendChild(extraDiv);
        }

        function removeExtra(id) {
            const extra = document.getElementById(id);
            if (extra) extra.remove();
        }

        // Adicionar 1 extra por padrão
        addExtra();

        document.getElementById('productImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value || 0);
        }

        function calculate() {
            const productName = document.getElementById('productName').value || 'Produto';
            const productionCost = parseFloat(document.getElementById('productionCost').value) || 0;
            const margin = parseFloat(document.getElementById('margin').value) || 0;

            let extrasTotal = 0;
            const extrasData = [];

            document.querySelectorAll('.extra-row').forEach(row => {
                const name = row.querySelector('.extra-name').value;
                const qty = parseFloat(row.querySelector('.extra-qty').value) || 0;
                const price = parseFloat(row.querySelector('.extra-price').value) || 0;
                
                if (name && qty > 0 && price > 0) {
                    const total = qty * price;
                    extrasTotal += total;
                    extrasData.push({ name, qty, price, total });
                }
            });

            const totalCost = productionCost + extrasTotal;
            const profitMargin = totalCost * (margin / 100);
            const salePrice = totalCost + profitMargin;
            const totalProfit = profitMargin;

            const companyProfit = totalProfit * 0.4;
            const partnerProfit = totalProfit * 0.2;

            // Salvar dados
            window.currentData = {
                productName, productionCost, extrasTotal, totalCost, 
                salePrice, totalProfit, margin, companyProfit, partnerProfit, extrasData
            };

            // Renderizar resultados
            const results = document.getElementById('results');
            results.innerHTML = `
                <div class="result-grid">
                    <div class="result-item">
                        <span class="result-label">Produção</span>
                        <span class="result-value">${formatCurrency(productionCost)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Extras</span>
                        <span class="result-value">${formatCurrency(extrasTotal)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Total Custo</span>
                        <span class="result-value">${formatCurrency(totalCost)}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">Venda</span>
                        <span class="result-value">${formatCurrency(salePrice)}</span>
                    </div>
                    <div class="result-item" style="background: rgba(16,185,129,0.3);">
                        <span class="result-label">Lucro Total</span>
                        <span class="result-value">${formatCurrency(totalProfit)}</span>
                    </div>
                </div>
                <div class="division-grid">
                    <div class="division-item">
                        <div class="division-role">Empresa 40%</div>
                        <div class="result-value">${formatCurrency(companyProfit)}</div>
                    </div>
                    <div class="division-item">
                        <div class="division-role">Sócio 1 20%</div>
                        <div class="result-value">${formatCurrency(partnerProfit)}</div>
                    </div>
                    <div class="division-item">
                        <div class="division-role">Sócio 2 20%</div>
                        <div class="result-value">${formatCurrency(partnerProfit)}</div>
                    </div>
                    <div class="division-item">
                        <div class="division-role">Sócio 3 20%</div>
                        <div class="result-value">${formatCurrency(partnerProfit)}</div>
                    </div>
                </div>
            `;
            results.style.display = 'block';
            results.scrollIntoView({ behavior: 'smooth' });
        }

        async function exportPDF() {
            if (!window.currentData) {
                alert('Calcule primeiro');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            let y = 20;
            
            // Header
            doc.setFontSize(18);
            doc.setTextColor(62, 130, 246);
            doc.setFont('helvetica', 'bold');
            doc.text('OTSA', 20, y);
            doc.setFontSize(12);
            doc.setFont('helvetica', 'normal');
            doc.text(window.currentData.productName, 20, y + 8);
            
            y += 25;

            // Imagem
            const img = document.getElementById('imagePreview');
            if (img.style.display !== 'none') {
                try {
                    const canvas = await html2canvas(img, { scale: 2 });
                    const imgData = canvas.toDataURL('image/png');
                    doc.addImage(imgData, 'PNG', 20, y, 40, 30);
                    y += 35;
                } catch(e) {}
            }

            // Tabelas
            doc.autoTable({
                startY: y,
                head: [['', 'R$']],
                body: [
                    ['Custo Produção', formatCurrency(window.currentData.productionCost)],
                    ['Custo Extras', formatCurrency(window.currentData.extrasTotal)],
                    ['TOTAL CUSTO', formatCurrency(window.currentData.totalCost)],
                    ['PREÇO VENDA', formatCurrency(window.currentData.salePrice)],
                    ['LUCRO TOTAL', formatCurrency(window.currentData.totalProfit)]
                ],
                theme: 'grid',
                styles: { fontSize: 10, cellPadding: 4 },
                headStyles: { fillColor: [30, 58, 138] },
                columnStyles: { 0: { halign: 'left' }, 1: { halign: 'right' } },
                rowStyles: { 3: { fillColor: [16, 185, 129] } }
            });

            y = doc.lastAutoTable.finalY + 15;

            doc.autoTable({
                startY: y,
                head: [['Divisão', 'R$']],
                body: [
                    ['Empresa (40%)', formatCurrency(window.currentData.companyProfit)],
                    ['Sócio 1 (20%)', formatCurrency(window.currentData.partnerProfit)],
                    ['Sócio 2 (20%)', formatCurrency(window.currentData.partnerProfit)],
                    ['Sócio 3 (20%)', formatCurrency(window.currentData.partnerProfit)]
                ],
                theme: 'grid',
                styles: { fontSize: 10, cellPadding: 4 },
                headStyles: { fillColor: [30, 58, 138] },
                columnStyles: { 0: { halign: 'left' }, 1: { halign: 'right' } }
            });

            doc.save(`OTSA_${window.currentData.productName.replace(/[^a-z0-9]/gi, '_')}.pdf`);
        }
    </script>
</body>
</html>
