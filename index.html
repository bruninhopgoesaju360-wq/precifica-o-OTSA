<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Precificação OTSA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

* { box-sizing: border-box; }

body {
    font-family: Arial;
    background: #191917;
    color: #eeeae1;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 15px;
}

h2 {
    color: #79a1bc;
    text-align: center;
}

.card {
    background: #222220;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #191917;
    color: #eeeae1;
}

.extra {
    display: flex;
    gap: 5px;
    margin-top: 5px;
}

.extra input { flex: 1; }

.extra input:nth-child(2),
.extra input:nth-child(3) {
    max-width: 70px;
}

.remove {
    width: 35px;
    background: red;
    color: white;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.primary {
    background: #79a1bc;
    color: #191917;
}

.secondary {
    background: #333;
}

.pdf {
    background: #eeeae1;
    color: #191917;
}

.preview {
    margin-top: 10px;
    text-align: center;
}

.preview img {
    max-width: 100%;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Precificação OTSA</h2>

<div class="card">

<input id="nome" placeholder="Nome do produto">

<select id="categoria" onchange="setMargem(this.value)">
<option value="">Categoria</option>
<option value="acessorio">Acessório</option>
<option value="blusa">Blusa</option>
</select>

<input id="custo" type="number" placeholder="Custo">

<input id="margem" placeholder="Margem (%)">

</div>

<div class="card">

<label>Foto do produto</label>

<input type="file"
accept="image/*"
onchange="previewImagem(event)">

<div class="preview" id="preview"></div>

</div>

<div class="card">

<div id="extras"></div>

<button class="secondary"
onclick="addExtra()">
+ Extra
</button>

<input id="frete"
type="number"
placeholder="Frete">

<input id="desconto"
type="number"
placeholder="Desconto (%)">

</div>

<div class="card">

<textarea id="obs"
placeholder="Observações"></textarea>

</div>

<div class="card">

<button class="primary"
onclick="calcular()">
Calcular
</button>

<button class="pdf"
onclick="gerarPDF()">
Gerar PDF para Assinatura
</button>

</div>

<div class="card" id="resultado"></div>

</div>

<script>

let dados = {};
let imagemBase64 = "";

function setMargem(tipo){

    if(tipo==="acessorio")
        margem.value = 200;

    if(tipo==="blusa")
        margem.value = 120;
}

function addExtra(){

    let div = document.createElement("div");

    div.className = "extra";

    div.innerHTML = `
        <input placeholder="Nome">
        <input type="number" placeholder="R$">
        <input type="number" placeholder="Qtd">
        <button class="remove"
        onclick="this.parentElement.remove()">X</button>
    `;

    extras.appendChild(div);
}

function previewImagem(event){

    let file = event.target.files[0];

    let reader = new FileReader();

    reader.onload = function(e){

        imagemBase64 = e.target.result;

        preview.innerHTML =
        `<img src="${imagemBase64}">`;
    };

    if(file)
        reader.readAsDataURL(file);
}

function calcular(){

    let nome = nomeEl.value;

    let custo =
    parseFloat(custoEl.value)||0;

    let frete =
    parseFloat(freteEl.value)||0;

    let margem =
    parseFloat(margemEl.value)||0;

    let desconto =
    parseFloat(descontoEl.value)||0;

    let totalExtras = 0;

    document.querySelectorAll(".extra")
    .forEach(e=>{

        let v =
        parseFloat(e.children[1].value)||0;

        let q =
        parseFloat(e.children[2].value)||0;

        totalExtras += v*q;

    });

    let total =
    custo + frete + totalExtras;

    let final =
    total*(1+margem/100)
    *(1-desconto/100);

    let lucro =
    final - total;

    dados={
        nome,
        total,
        final,
        lucro
    };

    resultado.innerHTML=`
        <b>${nome}</b><br>
        Preço final: R$ ${final.toFixed(2)}<br>
        Lucro: R$ ${lucro.toFixed(2)}
    `;
}

async function gerarPDF(){

    const { jsPDF } = window.jspdf;

    let doc = new jsPDF();

    let y = 10;

    doc.setFontSize(18);

    doc.text(
    "DOCUMENTO DE APROVACAO OTSA",
    10,y);

    y+=10;

    doc.setFontSize(12);

    doc.text(
    "ETAPA 1 - IDENTIFICACAO",
    10,y);

    y+=8;

    doc.text(
    "Produto: "+dados.nome,
    10,y);

    y+=10;

    doc.text(
    "ETAPA 2 - PRECIFICACAO",
    10,y);

    y+=8;

    doc.text(
    "Custo total: R$ "+
    dados.total.toFixed(2),
    10,y);

    y+=8;

    doc.text(
    "Preco final: R$ "+
    dados.final.toFixed(2),
    10,y);

    y+=8;

    doc.text(
    "Lucro estimado: R$ "+
    dados.lucro.toFixed(2),
    10,y);

    y+=12;

    doc.text(
    "ETAPA 3 - OBSERVACOES",
    10,y);

    y+=8;

    let obsTexto =
    document.getElementById("obs").value
    || "Nenhuma.";

    doc.text(
    obsTexto,
    10,y,
    { maxWidth:180 });

    y+=20;

    doc.text(
    "ETAPA 4 - IMAGEM DO PRODUTO",
    10,y);

    y+=5;

    if(imagemBase64){

        doc.addImage(
        imagemBase64,
        "JPEG",
        10,y,
        60,
        60);

        y+=65;
    }

    doc.text(
    "ETAPA 5 - APROVACAO",
    10,y);

    y+=10;

    doc.setFontSize(10);

    doc.text(
    "Este documento confirma a aprovacao do preco definido.",
    10,y,
    { maxWidth:180 });

    y+=15;

    doc.line(10,y,80,y);

    doc.text(
    "Assinatura Socio 1",
    10,y+5);

    doc.line(110,y,180,y);

    doc.text(
    "Assinatura Socio 2",
    110,y+5);

    y+=20;

    doc.line(10,y,80,y);

    doc.text(
    "Assinatura Socio 3",
    10,y+5);

    doc.line(110,y,180,y);

    doc.text(
    "Data",
    110,y+5);

    doc.save(
    "precificacao_otsa_aprovacao.pdf");

}

const nomeEl =
document.getElementById("nome");

const custoEl =
document.getElementById("custo");

const margemEl =
document.getElementById("margem");

const freteEl =
document.getElementById("frete");

const descontoEl =
document.getElementById("desconto");

</script>

</body>
</html>
